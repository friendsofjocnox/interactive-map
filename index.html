<!DOCTYPE html>
<html>
<head>
    <title>Global Command: Strategic Standoff</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #050a0e; font-family: 'Courier New', monospace; }
        #map { height: 100vh; width: 100vw; background: #050a0e; cursor: crosshair; }
        
        .ui-panel {
            position: absolute; z-index: 1000; background: rgba(0, 15, 20, 0.95); color: #0f0; 
            padding: 15px; border: 1px solid #005500; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); user-select: none;
        }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0f0; }
        #player-ui { top: 10px; left: 10px; width: 280px; }
        #gm-ui { top: 10px; right: 10px; display: none; width: 320px; max-height: 90vh; overflow-y: auto; }
        
        button { cursor: pointer; background: #002200; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 4px 0; width: 100%; text-align: left; font-family: inherit; transition: 0.1s; }
        button:hover { background: #0f0; color: #000; }
        input[type="text"], input[type="password"] { background: #001100; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; width: calc(100% - 24px); }
        .active-btn { background: #ff00ff !important; color: #fff !important; border-color: #fff; }

        /* Announcement Banner */
        #announcement-banner {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%); z-index: 2000;
            background: rgba(255, 0, 0, 0.8); color: white; padding: 20px 40px; font-size: 24px; font-weight: bold;
            border: 2px solid white; text-transform: uppercase; display: none; text-shadow: 2px 2px 4px #000;
        }

        /* Markers */
        .base-marker { border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 10px currentColor; }
        .missile-marker { color: red; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px black; text-align: center; margin-top: -8px; margin-left: -4px;}
        .phantom-marker { opacity: 0.5; border: 2px dashed cyan; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="border: 1px solid #0f0; padding: 40px; text-align: center;">
            <h1>DEFCON STRATEGY LINK</h1>
            <select id="role-select" style="background: #001100; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 200px;">
                <option value="PLAYER">PLAYER COMMAND</option>
                <option value="GM">GAME MASTER</option>
            </select><br>
            <input type="password" id="access-code" placeholder="ACCESS CODE (1234)"><br>
            <button onclick="login()" style="text-align: center;">INITIALIZE LINK</button>
        </div>
    </div>

    <div id="announcement-banner"></div>

    <div id="player-ui" class="ui-panel" style="display: none;">
        <b>PLAYER COMMAND</b><hr>
        <span style="color:cyan;">Base Management:</span><br>
        <small style="color:#aaa;">Click your Base, then Right-Click map to request a relocation.</small><br>
        <hr>
        Selected Base: <span id="selected-base-id" style="color:yellow;">None</span>
    </div>

    <div id="gm-ui" class="ui-panel">
        <b>GAME MASTER CONSOLE</b><hr>
        
        <b>TOOLS:</b>
        <button onclick="setGMAction('base')" id="btn-base">1. PLACE PLAYER BASE (CLICK MAP)</button>
        <button onclick="setGMAction('missile')" id="btn-missile">2. LAUNCH MISSILE (CLICK MAP)</button>
        <hr>
        
        <b>GLOBAL BROADCAST:</b>
        <input type="text" id="announce-input" placeholder="Enter message...">
        <button onclick="sendAnnouncement()">SEND ANNOUNCEMENT</button>
        <hr>

        <b>MOVE REQUESTS:</b>
        <div id="move-requests" style="min-height: 50px; border: 1px dashed #333; padding: 5px;"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        // --- 1. SETTINGS ---
const SUPABASE_URL = 'https://hfripibhhypbvnoimzdr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmcmlwaWJoaHlwYnZub2ltemRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzOTQ1NjYsImV4cCI6MjA4Njk3MDU2Nn0.h_uP2EVvjJMoPlcUFGOiaKOj6JFdspnYvC2OqR5a10g';

        const gameServer = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- MAP SETUP (FIXED BOUNDS) ---
        // Prevents panning infinitely sideways or up/down
        const worldBounds = [[-90, -180], [90, 180]];
        const map = L.map('map', { 
            zoomControl: false, doubleClickZoom: false, attributionControl: false,
            maxBounds: worldBounds, maxBoundsViscosity: 1.0, minZoom: 2
        }).setView([20, 0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            noWrap: true, bounds: worldBounds
        }).addTo(map);

        // --- STATE VARIABLES ---
        let userRole = null;
        let gmAction = null;
        let selectedBase = null;
        
        const bases = {}; 
        const missiles = {};
        const requests = {};
        const gmTargetLines = {}; // Lines visible only to GM

        const MISSILE_FLIGHT_TIME_MS = 25 * 60 * 1000; // 25 Minutes

        const channel = gameServer.channel('defcon', { config: { broadcast: { self: true } } });

        // --- AUTH ---
        window.login = () => {
            if (document.getElementById('access-code').value === '1234') { 
                userRole = document.getElementById('role-select').value;
                document.getElementById('auth-overlay').style.display = 'none';
                if(userRole === 'GM') document.getElementById('gm-ui').style.display = 'block';
                else document.getElementById('player-ui').style.display = 'block';
                startLocalSimulation(); // Start rendering engine
            } else { alert("INVALID CODE"); }
        };

        // --- GM CONTROLS ---
        window.setGMAction = (action) => {
            gmAction = gmAction === action ? null : action;
            document.getElementById('btn-base').classList.toggle('active-btn', gmAction === 'base');
            document.getElementById('btn-missile').classList.toggle('active-btn', gmAction === 'missile');
        };

        window.sendAnnouncement = () => {
            const msg = document.getElementById('announce-input').value;
            if(!msg) return;
            channel.send({ type: 'broadcast', event: 'announcement', payload: msg });
            document.getElementById('announce-input').value = '';
        };

        // --- NETWORK RECEIVERS ---
        channel
            .on('broadcast', { event: 'sync_base' }, ({ payload }) => renderBase(payload))
            .on('broadcast', { event: 'launch_missile' }, ({ payload }) => registerMissile(payload))
            .on('broadcast', { event: 'announcement' }, ({ payload }) => showAnnouncement(payload))
            .on('broadcast', { event: 'move_request' }, ({ payload }) => handleMoveRequest(payload))
            .on('broadcast', { event: 'resolve_move' }, ({ payload }) => resolveMove(payload))
            .on('broadcast', { event: 'base_destroyed' }, ({ payload }) => destroyBase(payload.id))
            .subscribe();

        // --- MAP INTERACTIONS ---
        map.on('click', (e) => {
            // GM Logic
            if (userRole === 'GM') {
                if (gmAction === 'base') {
                    const id = 'b_' + Math.random().toString(36).substr(2, 5);
                    channel.send({ type: 'broadcast', event: 'sync_base', payload: { id, lat: e.latlng.lat, lng: e.latlng.lng }});
                    setGMAction(null);
                } else if (gmAction === 'missile') {
                    const baseKeys = Object.keys(bases);
                    if (baseKeys.length === 0) return alert("No bases to target!");
                    
                    // Pick Random Base
                    const targetId = baseKeys[Math.floor(Math.random() * baseKeys.length)];
                    const targetPos = bases[targetId].getLatLng();
                    
                    const mId = 'm_' + Math.random().toString(36).substr(2, 5);
                    channel.send({ type: 'broadcast', event: 'launch_missile', payload: { 
                        id: mId, startLat: e.latlng.lat, startLng: e.latlng.lng, 
                        targetLat: targetPos.lat, targetLng: targetPos.lng, targetId: targetId,
                        startTime: Date.now()
                    }});
                    setGMAction(null);
                }
            } else {
                // Player clicked map (deselect base)
                selectedBase = null;
                document.getElementById('selected-base-id').innerText = "None";
                Object.values(bases).forEach(b => b.setStyle({ color: '#fff' }));
            }
        });

        // Player Request Move
        map.on('contextmenu', (e) => {
            e.originalEvent.preventDefault();
            if (userRole === 'PLAYER' && selectedBase) {
                const reqId = 'req_' + Math.random().toString(36).substr(2, 5);
                channel.send({ type: 'broadcast', event: 'move_request', payload: { reqId, baseId: selectedBase, lat: e.latlng.lat, lng: e.latlng.lng }});
                alert("Move request transmitted to Game Master.");
            }
        });

        // --- ENTITY LOGIC ---
        function renderBase(data) {
            if (!bases[data.id]) {
                bases[data.id] = L.circleMarker([data.lat, data.lng], { 
                    radius: 12, fillColor: '#0077ff', color: '#fff', weight: 2, fillOpacity: 0.8 
                }).addTo(map);
                
                // Player Selection
                bases[data.id].on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    if (userRole === 'PLAYER') {
                        Object.values(bases).forEach(b => b.setStyle({ color: '#fff' }));
                        selectedBase = data.id;
                        document.getElementById('selected-base-id').innerText = "Base Selected";
                        bases[data.id].setStyle({ color: 'cyan' });
                    }
                });
            } else {
                bases[data.id].setLatLng([data.lat, data.lng]);
            }
        }

        function registerMissile(data) {
            missiles[data.id] = data;
            
            // GM sees the target line
            if (userRole === 'GM') {
                gmTargetLines[data.id] = L.polyline(
                    [[data.startLat, data.startLng], [data.targetLat, data.targetLng]], 
                    { color: 'red', weight: 1, dashArray: '5, 5', opacity: 0.5 }
                ).addTo(map);
            }

            // Create Icon
            missiles[data.id].marker = L.marker([data.startLat, data.startLng], { 
                icon: L.divIcon({ className: 'missile-marker', html: '🚀' }) 
            }).addTo(map);
        }

        function handleMoveRequest(data) {
            if (userRole === 'GM') {
                // Show phantom marker
                requests[data.reqId] = {
                    data: data,
                    marker: L.circleMarker([data.lat, data.lng], { radius: 12, color: 'cyan', className: 'phantom-marker' }).addTo(map)
                };

                // Add to UI
                const d = document.createElement('div'); d.id = data.reqId;
                d.innerHTML = `<small>Base Relocation Req</small><br>
                    <button onclick="approveMove('${data.reqId}', true)" style="width:48%; background:#050;">APPROVE</button>
                    <button onclick="approveMove('${data.reqId}', false)" style="width:48%; background:#500;">DENY</button>`;
                document.getElementById('move-requests').appendChild(d);
            }
        }

        window.approveMove = (reqId, approved) => {
            channel.send({ type: 'broadcast', event: 'resolve_move', payload: { reqId, approved }});
        };

        function resolveMove(data) {
            if (userRole === 'GM' && requests[data.reqId]) {
                map.removeLayer(requests[data.reqId].marker);
                document.getElementById(data.reqId).remove();
                
                if (data.approved) {
                    const req = requests[data.reqId].data;
                    channel.send({ type: 'broadcast', event: 'sync_base', payload: { id: req.baseId, lat: req.lat, lng: req.lng }});
                }
                delete requests[data.reqId];
            } else if (userRole === 'PLAYER') {
                if (data.approved) alert("HQ: Relocation Approved.");
                else alert("HQ: Relocation Denied. Hold position.");
            }
        }

        function destroyBase(id) {
            if (bases[id]) {
                const pos = bases[id].getLatLng();
                map.removeLayer(bases[id]);
                delete bases[id];
                // Explosion visual
                const boom = L.circleMarker(pos, { radius: 40, fillColor: 'red', color: 'orange', fillOpacity: 0.8 }).addTo(
