<!DOCTYPE html>
<html>
<head>
    <title>DEFCON: Global Ops</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #map { height: 100vh; width: 100vw; background: #050a0e; cursor: crosshair; }
        
        /* UI Panels */
        .ui-panel {
            position: absolute; z-index: 1000; background: rgba(0, 10, 15, 0.95); color: #0f0; 
            padding: 15px; border: 1px solid #005500; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; color: #0f0; }
        #player-ui { top: 10px; left: 10px; width: 280px; display: none; }
        #gm-ui { top: 10px; right: 10px; width: 320px; display: none; max-height: 90vh; overflow-y: auto; }
        
        /* Buttons & Inputs */
        button { cursor: pointer; background: #002200; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 4px 0; width: 100%; font-family: inherit; }
        button:hover { background: #0f0; color: #000; }
        input, select { background: #001100; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; width: 220px; font-family: inherit; }
        .active-btn { background: #ff00ff !important; color: #fff !important; }

        /* HUD elements */
        #announcement-banner {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%); z-index: 2000;
            background: rgba(200, 0, 0, 0.9); color: white; padding: 20px 40px; font-size: 22px; 
            border: 2px solid white; display: none; text-align: center;
        }
        .threat-list { color: #ff3333; font-size: 13px; margin-top: 10px; border-top: 1px solid #330000; padding-top: 10px; }
        .missile-marker { color: red; font-size: 20px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="border: 2px solid #0f0; padding: 50px; text-align: center; background: #000800;">
            <h1 style="letter-spacing: 5px;">STRATEGIC COMMAND</h1>
            <select id="role-select">
                <option value="PLAYER">PLAYER ACCESS</option>
                <option value="GM">GAME MASTER ACCESS</option>
            </select><br>
            <input type="password" id="access-code" placeholder="ENCRYPTION KEY (1234)"><br>
            <button onclick="attemptLogin()">INITIALIZE LINK</button>
            <div id="login-error" style="color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <div id="announcement-banner"></div>

    <div id="player-ui" class="ui-panel">
        <b style="color:cyan;">UNIT COMMAND</b><hr>
        <small>Select base (Click), Request move (Right-Click)</small><br>
        Selection: <span id="sel-id" style="color:yellow;">None</span>
        <div class="threat-list" id="p-threats">NO ACTIVE THREATS</div>
    </div>

    <div id="gm-ui" class="ui-panel">
        <b>COMMAND CONSOLE (GM)</b><hr>
        <button onclick="setGMTool('base')" id="btn-base">PLACE PLAYER BASE</button>
        <button onclick="setGMTool('missile')" id="btn-missile">LAUNCH MISSILE</button>
        <hr>
        <b>MISSILE TRACKING:</b>
        <div class="threat-list" id="gm-threats">NO ACTIVE THREATS</div>
        <hr>
        <input type="text" id="ann-input" style="width: 90%;" placeholder="Broadcast message...">
        <button onclick="broadcastMsg()">SEND ANNOUNCEMENT</button>
        <div id="gm-requests" style="margin-top:10px; border-top: 1px dashed #444;"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        // --- CONFIGURATION ---
        const SB_URL = 'https://hfripibhhypbvnoimzdr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmcmlwaWJoaHlwYnZub2ltemRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzOTQ1NjYsImV4cCI6MjA4Njk3MDU2Nn0.h_uP2EVvjJMoPlcUFGOiaKOj6JFdspnYvC2OqR5a10g';
        
        let supabase = null;
        try {
            supabase = createClient(SB_URL, SB_KEY);
        } catch(e) { console.error("Supabase Init Error:", e); }

        const channel = supabase ? supabase.channel('war-room', { config: { broadcast: { self: true } } }) : null;

        // --- GLOBALS ---
        window.userRole = null;
        window.gmTool = null;
        let selectedBaseId = null;
        const bases = {};
        const missiles = {};
        const requests = {};
        const gmLines = {};
        const flightTime = 25 * 60 * 1000;

        // --- MAP SETUP ---
        const bounds = [[-85, -180], [85, 180]];
        const map = L.map('map', { 
            maxBounds: bounds, maxBoundsViscosity: 1.0, 
            zoomControl: false, attributionControl: false 
        }).setView([20, 0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);

        // --- LOGIN LOGIC (FAIL-SAFE) ---
        window.attemptLogin = () => {
            const code = document.getElementById('access-code').value;
            const role = document.getElementById('role-select').value;

            if (code === '1234') {
                window.userRole = role;
                document.getElementById('auth-overlay').style.display = 'none';
                
                if (role === 'GM') document.getElementById('gm-ui').style.display = 'block';
                else document.getElementById('player-ui').style.display = 'block';
                
                initNetwork();
                startLoop();
            } else {
                document.getElementById('login-error').innerText = "ACCESS DENIED: INVALID KEY";
            }
        };

        // --- NETWORK ---
        function initNetwork() {
            if (!channel) return;
            channel
                .on('broadcast', { event: 'base' }, ({payload}) => syncBase(payload))
                .on('broadcast', { event: 'missile' }, ({payload}) => syncMissile(payload))
                .on('broadcast', { event: 'ann' }, ({payload}) => showAnn(payload))
                .on('broadcast', { event: 'req' }, ({payload}) => handleReq(payload))
                .on('broadcast', { event: 'res' }, ({payload}) => resolveReq(payload))
                .on('broadcast', { event: 'kill' }, ({payload}) => killBase(payload.id))
                .subscribe();
        }

        // --- TOOLS ---
        window.setGMTool = (t) => {
            window.gmTool = window.gmTool === t ? null : t;
            document.getElementById('btn-base').className = window.gmTool === 'base' ? 'active-btn' : '';
            document.getElementById('btn-missile').className = window.gmTool === 'missile' ? 'active-btn' : '';
        };

        window.broadcastMsg = () => {
            const val = document.getElementById('ann-input').value;
            if (val && channel) channel.send({ type: 'broadcast', event: 'ann', payload: val });
            document.getElementById('ann-input').value = '';
        };

        // --- ACTIONS ---
        map.on('click', (e) => {
            if (window.userRole === 'GM') {
                if (window.gmTool === 'base') {
                    send('base', { id: 'b'+Math.random(), lat: e.latlng.lat, lng: e.latlng.lng });
                    window.setGMTool(null);
                } else if (window.gmTool === 'missile') {
                    const keys = Object.keys(bases);
                    if (!keys.length) return alert("No targets available.");
                    const tid = keys[Math.floor(Math.random() * keys.length)];
                    const tpos = bases[tid].getLatLng();
                    send('missile', { 
                        id: 'm'+Math.random(), start: e.latlng, target: tpos, tid: tid, time: Date.now() 
                    });
                    window.setGMTool(null);
                }
            } else {
                selectedBaseId = null;
                document.getElementById('sel-id').innerText = "None";
                Object.values(bases).forEach(b => b.setStyle({ color: '#fff' }));
            }
        });

        map.on('contextmenu', (e) => {
            e.originalEvent.preventDefault();
            if (window.userRole === 'PLAYER' && selectedBaseId) {
                send('req', { rid: 'r'+Math.random(), bid: selectedBaseId, lat: e.latlng.lat, lng: e.latlng.lng });
                alert("Move Request Sent.");
            }
        });

        // --- HANDLERS ---
        function send(event, payload) { if(channel) channel.send({ type: 'broadcast', event, payload }); }

        function syncBase(d) {
            if (!bases[d.id]) {
                bases[d.id] = L.circleMarker([d.lat, d.lng], { radius: 10, fillColor: '#0077ff', color: '#fff', fillOpacity: 0.8 }).addTo(map);
                bases[d.id].on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    if (window.userRole === 'PLAYER') {
                        selectedBaseId = d.id;
                        document.getElementById('sel-id').innerText = "Base Active";
                        Object.values(bases).forEach(b => b.setStyle({ color: '#fff' }));
                        bases[d.id].setStyle({ color: 'cyan' });
                    }
                });
            } else { bases[d.id].setLatLng([d.lat, d.lng]); }
        }

        function syncMissile(d) {
            missiles[d.id] = d;
            missiles[d.id].marker = L.marker([d.start.lat, d.start.lng], { 
                icon: L.divIcon({ className: 'missile-marker', html: '🚀' }) 
            }).addTo(map);
            if (window.userRole === 'GM') {
                gmLines[d.id] = L.polyline([d.start, d.target], { color: 'red', weight: 1, dashArray: '5' }).addTo(map);
            }
        }

        function handleReq(d) {
            if (window.userRole !== 'GM') return;
            requests[d.rid] = { d, m: L.circleMarker([d.lat, d.lng], { radius: 10, color: 'cyan', dashArray: '3' }).addTo(map) };
            const div = document.createElement('div'); div.id = d.rid;
            div.innerHTML = `<small>Relocation Req</small><br>
                <button onclick="approve('${d.rid}', true)" style="width:45%; background:green;">YES</button>
                <button onclick="approve('${d.rid}', false)" style="width:45%; background:red;">NO</button>`;
            document.getElementById('gm-requests').appendChild(div);
        }
        window.approve = (rid, ok) => { send('res', { rid, ok }); };

        function resolveReq(d) {
            if (window.userRole === 'GM' && requests[d.rid]) {
                map.removeLayer(requests[d.rid].m);
                document.getElementById(d.rid).remove();
                if (d.ok) {
                    const r = requests[d.rid].d;
                    send('base', { id: r.bid, lat: r.lat, lng: r.lng });
                }
                delete requests[d.rid];
            }
        }

        function killBase(id) {
            if (bases[id]) { map.removeLayer(bases[id]); delete bases[id]; }
        }

        function showAnn(m) {
            const b = document.getElementById('announcement-banner');
            b.innerText = m; b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 7000);
        }

        // --- LOOP ---
        function startLoop() {
            setInterval(() => {
                const now = Date.now();
                let threatHTML = "";

                Object.keys(missiles).forEach(id => {
                    const m = missiles[id];
                    const elapsed = now - m.time;
                    const pct = Math.min(elapsed / flightTime, 1);
                    
                    const left = Math.max(0, flightTime - elapsed);
                    const min = Math.floor(left/60000);
                    const sec = Math.floor((left%60000)/1000);
                    threatHTML += `<div>INC MISSILE: <span style="float:right;">${min}:${sec < 10 ? '0'+sec : sec}</span></div>`;

                    if (pct >= 1) {
                        map.removeLayer(m.marker);
                        if(gmLines[id]) map.removeLayer(gmLines[id]);
                        if(window.userRole === 'GM' && bases[m.tid]) send('kill', { id: m.tid });
                        delete missiles[id];
                    } else {
                        const curLat = m.start.lat + (m.target.lat - m.start.lat) * pct;
                        const curLng = m.start.lng + (m.target.lng - m.start.lng) * pct;
                        m.marker.setLatLng([curLat, curLng]);
                    }
                });

                document.getElementById('p-threats').innerHTML = threatHTML || "NO ACTIVE THREATS";
                document.getElementById('gm-threats').innerHTML = threatHTML || "NO ACTIVE THREATS";
            }, 500);
        }
    </script>
</body>
</html>
